name: nudge
description: A minimal habit and counter tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  google_generative_ai: ^0.4.5
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  health: ^13.3.1
  usage_stats: ^1.1.0
  installed_apps: ^2.1.1
  wakelock_plus: ^1.4.0
  image_picker: ^1.1.2
  provider: ^6.1.5+1
  uuid: ^4.3.3
  flutter_markdown: ^0.7.3
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_local_notifications: ^19.5.0
  flutter_timezone: ^5.0.1
  timezone: ^0.10.1
  mobile_scanner: ^6.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  encrypt: ^5.0.3
  google_sign_in: ^6.2.1
  home_widget: ^0.6.0
  workmanager: ^0.9.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
